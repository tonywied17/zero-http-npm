<svg xmlns="http://www.w3.org/2000/svg" viewBox="40 40 432 432" width="512" height="512" aria-label="zero-server animated logo" overflow="hidden">
  <defs>
    <!-- Rotating gradient for the ring -->
    <linearGradient id="alogo-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7b61ff"/>
      <stop offset="50%" stop-color="#5865f2"/>
      <stop offset="100%" stop-color="#3ec6ff"/>
    </linearGradient>
    <linearGradient id="alogo-glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>
    <linearGradient id="alogo-hi" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <!-- Animated gradient for bolt shimmer -->
    <linearGradient id="bolt-shimmer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7b61ff">
        <animate attributeName="stop-color" values="#7b61ff;#3ec6ff;#7b61ff" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#5865f2">
        <animate attributeName="stop-color" values="#5865f2;#7b61ff;#5865f2" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#3ec6ff">
        <animate attributeName="stop-color" values="#3ec6ff;#a78bfa;#3ec6ff" dur="3s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <!-- Pulsing background glow -->
    <radialGradient id="abg-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5865f2" stop-opacity="0.12">
        <animate attributeName="stop-opacity" values="0.08;0.18;0.08" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#0e1114" stop-opacity="0"/>
    </radialGradient>
    <!-- Drop shadow filter -->
    <filter id="alogo-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#5865f2" flood-opacity="0.35"/>
    </filter>
    <!-- Glow filter with animated intensity -->
    <filter id="abolt-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Soft glow for ring flash -->
    <filter id="ring-flash-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="glow"/>
      <feComposite in="SourceGraphic" in2="glow" operator="over"/>
    </filter>
    <!-- Radial fade mask for orbital dots — fade before reaching ring -->
    <mask id="orb-fade-mask">
      <radialGradient id="orb-fade-grad" cx="256" cy="256" r="145" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="white"/>
        <stop offset="65%" stop-color="white"/>
        <stop offset="90%" stop-color="rgba(255,255,255,0.3)"/>
        <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
      </radialGradient>
      <rect x="0" y="0" width="512" height="512" fill="url(#orb-fade-grad)"/>
    </mask>
    <!-- Clip to viewBox bounds -->
    <clipPath id="viewbox-clip">
      <rect x="40" y="40" width="432" height="432"/>
    </clipPath>
  </defs>

  <g clip-path="url(#viewbox-clip)">

  <!-- Background glow — pulsing -->
  <circle cx="256" cy="256" r="200" fill="url(#abg-glow)"/>

  <!-- Outer ring — subtle pulse -->
  <circle cx="256" cy="256" r="195" fill="none"
          stroke="url(#alogo-grad)" stroke-width="24"
          stroke-linecap="round" opacity="0.15">
    <animate attributeName="opacity" values="0.1;0.2;0.1" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Main ring -->
  <circle cx="256" cy="256" r="170" fill="none"
          stroke="url(#alogo-grad)" stroke-width="32"
          stroke-linecap="round" filter="url(#alogo-shadow)"/>

  <!-- Occasional ring flash — smooth pulse every 6s -->
  <circle cx="256" cy="256" r="170" fill="none"
          stroke="url(#alogo-glow)" stroke-width="8"
          stroke-linecap="round" opacity="0" filter="url(#ring-flash-glow)">
    <animate attributeName="opacity" values="0;0;0.4;0.5;0.3;0;0;0" dur="6s" repeatCount="indefinite"
             keyTimes="0;0.6;0.7;0.75;0.8;0.85;0.9;1"/>
  </circle>

  <!-- Highlight arc on top-left of the ring -->
  <path d="M 140,175 A 170,170 0 0,1 330,100"
        fill="none" stroke="url(#alogo-hi)" stroke-width="14"
        stroke-linecap="round" opacity="0.6"/>

  <!-- Lightning bolt — shimmer gradient -->
  <g filter="url(#abolt-glow)">
    <!-- Bolt body -->
    <path d="
      M 222 82
      L 186 242
      L 252 242
      L 182 435
      L 330 205
      L 258 205
      L 296 82
      Z
    " fill="url(#bolt-shimmer)"/>

    <!-- Bolt inner highlight — subtle pulse -->
    <path d="
      M 228 100
      L 202 238
      L 252 238
      L 204 395
      L 318 212
      L 262 212
      L 288 100
      Z
    " fill="url(#alogo-hi)" opacity="0.5">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Occasional bolt flash — brief brightness burst every 8s -->
  <g opacity="0">
    <path d="
      M 222 82
      L 186 242
      L 252 242
      L 182 435
      L 330 205
      L 258 205
      L 296 82
      Z
    " fill="white" opacity="0.3"/>
    <animate attributeName="opacity" values="0;0;0;0.8;0.4;0;0;0" dur="8s" repeatCount="indefinite"
             keyTimes="0;0.55;0.58;0.6;0.63;0.68;0.7;1" begin="3s"/>
  </g>

  <!-- Orbital dots — masked with radial fade so they vanish near the ring edge -->
  <g mask="url(#orb-fade-mask)">
    <!-- Dot 1: clockwise orbit r=125 -->
    <circle r="7" fill="#7b61ff" opacity="0">
      <animateMotion dur="8s" repeatCount="indefinite"
        path="M 381,256 A 125,125 0 1,1 380.9,256"/>
      <animate attributeName="opacity" values="0.6;0.5;0.25;0.5;0.6" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="r" values="7;5;7" dur="8s" repeatCount="indefinite"/>
    </circle>

    <!-- Dot 2: counter-clockwise orbit r=125, offset start -->
    <circle r="7" fill="#3ec6ff" opacity="0">
      <animateMotion dur="10s" repeatCount="indefinite"
        path="M 131,256 A 125,125 0 1,0 131.1,256"/>
      <animate attributeName="opacity" values="0.5;0.4;0.2;0.4;0.5" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="r" values="7;4;7" dur="10s" repeatCount="indefinite"/>
    </circle>

    <!-- Dot 3: small fast orbiter r=105 -->
    <circle r="4" fill="#5865f2" opacity="0">
      <animateMotion dur="6s" repeatCount="indefinite"
        path="M 256,151 A 105,105 0 1,1 255.9,151"/>
      <animate attributeName="opacity" values="0.45;0.15;0.45" dur="6s" repeatCount="indefinite"/>
    </circle>

    <!-- Dot 4: small accent orbiter r=135 -->
    <circle r="4" fill="#67e8f9" opacity="0">
      <animateMotion dur="14s" repeatCount="indefinite"
        path="M 256,391 A 135,135 0 1,0 256.1,391"/>
      <animate attributeName="opacity" values="0.4;0.3;0.1;0.3;0.4" dur="14s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Particle trail — tiny dots that fade in/out, within bounds -->
  <circle cx="160" cy="140" r="2" fill="#a78bfa">
    <animate attributeName="opacity" values="0;0.6;0" dur="3s" repeatCount="indefinite" begin="0s"/>
    <animate attributeName="r" values="1;3;1" dur="3s" repeatCount="indefinite" begin="0s"/>
  </circle>
  <circle cx="350" cy="380" r="2" fill="#67e8f9">
    <animate attributeName="opacity" values="0;0.5;0" dur="3.5s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="r" values="1;2.5;1" dur="3.5s" repeatCount="indefinite" begin="1s"/>
  </circle>
  <circle cx="370" cy="150" r="1.5" fill="#3ec6ff">
    <animate attributeName="opacity" values="0;0.4;0" dur="4s" repeatCount="indefinite" begin="2s"/>
    <animate attributeName="r" values="1;2;1" dur="4s" repeatCount="indefinite" begin="2s"/>
  </circle>
  <circle cx="140" cy="370" r="1.5" fill="#7b61ff">
    <animate attributeName="opacity" values="0;0.4;0" dur="2.8s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="r" values="1;2;1" dur="2.8s" repeatCount="indefinite" begin="0.5s"/>
  </circle>

  </g>
</svg>
